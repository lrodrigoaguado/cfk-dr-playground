apiVersion: platform.confluent.io/v1beta1
kind: ConfluentRolebinding
metadata:
  name: admin-kafka-systemadmin
  namespace: confluent
spec:
  principal:
    type: user
    name: admin
  role: SystemAdmin
  kafkaRestClassRef:
    name: secondary-cluster-restclass
  clustersScopeByIds:
    kafkaClusterId: secondaryCluster-12345
---
