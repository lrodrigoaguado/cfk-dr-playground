apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  clusterID: "secondaryCluster-12345"
  dataVolumeCapacity: 2G
  image:
    application: confluentinc/cp-server:8.1.0
    init: confluentinc/confluent-init-container:3.1.0
  listeners:
    controller:
      tls:
        enabled: true
      authentication:
        type: mtls
        principalMappingRules:
          - RULE:.*CN=([a-zA-Z0-9._-]*).*$/$1/,DEFAULT
  tls:
    secretRef: kraftcontroller-tls
  replicas: 1
  podTemplate:
    resources:
      limits:
        memory: 768Mi
        cpu: 200m
      requests:
        memory: 256Mi
        cpu: 75m
  dependencies:
    metricsClient:
      url: https://controlcenter-ng.confluent.svc.cluster.local:9090
      authentication:
        type: mtls
      tls:
        enabled: true
        secretRef: prometheus-client-tls
  configOverrides:
    server:
      - sni.host.check.enabled=false
      - confluent.schema.registry.url=https://schemaregistry.confluent.svc.cluster.local:8081
      - metric.reporters=io.confluent.telemetry.reporter.TelemetryReporter
      - confluent.telemetry.exporter._c3.type=http
      - confluent.telemetry.exporter._c3.enabled=true
      - confluent.telemetry.exporter._c3.metrics.include=io.confluent.kafka.server.request.(?!.*delta).*|io.confluent.kafka.server.server.broker.state|io.confluent.kafka.server.replica.manager.leader.count|io.confluent.kafka.server.request.queue.size|io.confluent.kafka.server.broker.topic.failed.produce.requests.rate.1.min|io.confluent.kafka.server.tier.archiver.total.lag|io.confluent.kafka.server.request.total.time.ms.p99|io.confluent.kafka.server.broker.topic.failed.fetch.requests.rate.1.min|io.confluent.kafka.server.broker.topic.total.fetch.requests.rate.1.min|io.confluent.kafka.server.partition.caught.up.replicas.count|io.confluent.kafka.server.partition.observer.replicas.count|io.confluent.kafka.server.tier.tasks.num.partitions.in.error|io.confluent.kafka.server.broker.topic.bytes.out.rate.1.min|io.confluent.kafka.server.request.total.time.ms.p95|io.confluent.kafka.server.controller.active.controller.count|io.confluent.kafka.server.session.expire.listener.zookeeper.disconnects.total|io.confluent.kafka.server.request.total.time.ms.p999|io.confluent.kafka.server.controller.active.broker.count|io.confluent.kafka.server.request.handler.pool.request.handler.avg.idle.percent.rate.1.min|io.confluent.kafka.server.session.expire.listener.zookeeper.disconnects.rate.1.min|io.confluent.kafka.server.controller.unclean.leader.elections.rate.1.min|io.confluent.kafka.server.replica.manager.partition.count|io.confluent.kafka.server.controller.unclean.leader.elections.total|io.confluent.kafka.server.partition.replicas.count|io.confluent.kafka.server.broker.topic.total.produce.requests.rate.1.min|io.confluent.kafka.server.controller.offline.partitions.count|io.confluent.kafka.server.socket.server.network.processor.avg.idle.percent|io.confluent.kafka.server.partition.under.replicated|io.confluent.kafka.server.log.log.start.offset|io.confluent.kafka.server.log.tier.size|io.confluent.kafka.server.log.size|io.confluent.kafka.server.tier.fetcher.bytes.fetched.total|io.confluent.kafka.server.request.total.time.ms.p50|io.confluent.kafka.server.tenant.consumer.lag.offsets|io.confluent.kafka.server.session.expire.listener.zookeeper.expires.rate.1.min|io.confluent.kafka.server.log.log.end.offset|io.confluent.kafka.server.broker.topic.bytes.in.rate.1.min|io.confluent.kafka.server.partition.under.min.isr|io.confluent.kafka.server.partition.in.sync.replicas.count|io.confluent.telemetry.http.exporter.batches.dropped|io.confluent.telemetry.http.exporter.items.total|io.confluent.telemetry.http.exporter.items.succeeded|io.confluent.telemetry.http.exporter.send.time.total.millis|io.confluent.kafka.server.controller.leader.election.rate.(?!.*delta).*|io.confluent.telemetry.http.exporter.batches.failed
      - confluent.telemetry.exporter._c3.client.base.url=https://controlcenter-ng.confluent.svc.cluster.local:9090/api/v1/otlp
      - confluent.telemetry.exporter._c3.client.compression=gzip
      - confluent.telemetry.exporter._c3.api.key=dummy
      - confluent.telemetry.exporter._c3.api.secret=dummy
      - confluent.telemetry.exporter._c3.buffer.pending.batches.max=80
      - confluent.telemetry.exporter._c3.buffer.batch.items.max=4000
      - confluent.telemetry.exporter._c3.buffer.inflight.submissions.max=10
      - confluent.telemetry.metrics.collector.interval.ms=60000
      - confluent.telemetry.remoteconfig._confluent.enabled=false
      - confluent.consumer.lag.emitter.enabled=true
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 3
  podTemplate:
    resources:
      limits:
        memory: 2048Mi
        cpu: 1000m
      requests:
        memory: 1536Mi
        cpu: 500m
  image:
    application: confluentinc/cp-server:8.1.0
    init: confluentinc/confluent-init-container:3.1.0
  dataVolumeCapacity: 10Gi
  tls:
    secretRef: kafka-tls
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:kraftcontroller
      - User:rest-class
      - User:schemaregistry
      - User:connect
      - User:controlcenter-ng
      - User:admin
      - User:cluster-link
      - User:clusterlink
  listeners:
    internal:
      authentication:
        type: mtls
        principalMappingRules:
          - RULE:.*CN=([a-zA-Z0-9._-]*).*$/$1/,DEFAULT
      tls:
        enabled: true
    external:
      authentication:
        type: mtls
        principalMappingRules:
          - RULE:.*CN=([a-zA-Z0-9._-]*).*$/$1/,DEFAULT
      tls:
        enabled: true
      externalAccess:
        type: nodePort
        nodePort:
          host: secondary-control-plane
          nodePortOffset: 30192
  services:
    mds:
      tls:
        enabled: true
      tokenKeyPair:
        secretRef: mds-token-keypair
      externalAccess:
        type: nodePort
        nodePort:
          host: secondary-control-plane
          nodePortOffset: 30180
      provider:
        type: file
        file:
          secretRef: mds-file-users
        mtls:
          sslClientAuthentication: requested
          principalMappingRules:
            - "RULE:.*CN=([a-zA-Z0-9._-]*).*$/$1/"
            - "DEFAULT"
      impersonation:
        admins:
          - User:krp
          - User:controlcenter-ng
        protectedUsers:
          - User:kafka
          - User:kraftcontroller
          - User:admin
    kafkaRest:
      externalAccess:
        type: nodePort
        nodePort:
          host: secondary-control-plane
          nodePortOffset: 30182
      authentication:
        type: mtls
      tls:
        enabled: true
  dependencies:
    kafkaRest:
      authentication:
        type: bearer
        bearer:
          secretRef: kafka-credential
    kRaftController:
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: mtls
      clusterRef:
        name: kraftcontroller
    metricsClient:
      url: https://controlcenter-ng.confluent.svc.cluster.local:9090
      authentication:
        type: mtls
      tls:
        enabled: true
        secretRef: prometheus-client-tls
    schemaRegistry:
      url: https://schemaregistry.confluent.svc.cluster.local:8081
      authentication:
        type: mtls
      tls:
        enabled: true
  configOverrides:
    server:
      - sni.host.check.enabled=false
      - ssl.principal.mapping.rules=RULE:^CN=(.*?)(?:,.*)?$/$1/,DEFAULT
      - confluent.schema.registry.url=https://schemaregistry.confluent.svc.cluster.local:8081
      - confluent.metadata.server.token.max.lifetime.ms=86400000
      - confluent.metadata.server.ssl.client.authentication=REQUESTED
      - confluent.metadata.server.ssl.principal.mapping.rules=RULE:^CN=(.*?)(?:,.*)?$/$1/,DEFAULT
      - metric.reporters=io.confluent.telemetry.reporter.TelemetryReporter
      - confluent.telemetry.exporter._c3.type=http
      - confluent.telemetry.exporter._c3.enabled=true
      - confluent.telemetry.exporter._c3.metrics.include=io.confluent.kafka.server.request.(?!.*delta).*|io.confluent.kafka.server.server.broker.state|io.confluent.kafka.server.replica.manager.leader.count|io.confluent.kafka.server.request.queue.size|io.confluent.kafka.server.broker.topic.failed.produce.requests.rate.1.min|io.confluent.kafka.server.tier.archiver.total.lag|io.confluent.kafka.server.request.total.time.ms.p99|io.confluent.kafka.server.broker.topic.failed.fetch.requests.rate.1.min|io.confluent.kafka.server.broker.topic.total.fetch.requests.rate.1.min|io.confluent.kafka.server.partition.caught.up.replicas.count|io.confluent.kafka.server.partition.observer.replicas.count|io.confluent.kafka.server.tier.tasks.num.partitions.in.error|io.confluent.kafka.server.broker.topic.bytes.out.rate.1.min|io.confluent.kafka.server.request.total.time.ms.p95|io.confluent.kafka.server.controller.active.controller.count|io.confluent.kafka.server.session.expire.listener.zookeeper.disconnects.total|io.confluent.kafka.server.request.total.time.ms.p999|io.confluent.kafka.server.controller.active.broker.count|io.confluent.kafka.server.request.handler.pool.request.handler.avg.idle.percent.rate.1.min|io.confluent.kafka.server.session.expire.listener.zookeeper.disconnects.rate.1.min|io.confluent.kafka.server.controller.unclean.leader.elections.rate.1.min|io.confluent.kafka.server.replica.manager.partition.count|io.confluent.kafka.server.controller.unclean.leader.elections.total|io.confluent.kafka.server.partition.replicas.count|io.confluent.kafka.server.broker.topic.total.produce.requests.rate.1.min|io.confluent.kafka.server.controller.offline.partitions.count|io.confluent.kafka.server.socket.server.network.processor.avg.idle.percent|io.confluent.kafka.server.partition.under.replicated|io.confluent.kafka.server.log.log.start.offset|io.confluent.kafka.server.log.tier.size|io.confluent.kafka.server.log.size|io.confluent.kafka.server.tier.fetcher.bytes.fetched.total|io.confluent.kafka.server.request.total.time.ms.p50|io.confluent.kafka.server.tenant.consumer.lag.offsets|io.confluent.kafka.server.session.expire.listener.zookeeper.expires.rate.1.min|io.confluent.kafka.server.log.log.end.offset|io.confluent.kafka.server.broker.topic.bytes.in.rate.1.min|io.confluent.kafka.server.partition.under.min.isr|io.confluent.kafka.server.partition.in.sync.replicas.count|io.confluent.telemetry.http.exporter.batches.dropped|io.confluent.telemetry.http.exporter.items.total|io.confluent.telemetry.http.exporter.items.succeeded|io.confluent.telemetry.http.exporter.send.time.total.millis|io.confluent.kafka.server.controller.leader.election.rate.(?!.*delta).*|io.confluent.telemetry.http.exporter.batches.failed
      - confluent.telemetry.exporter._c3.client.base.url=https://controlcenter-ng.confluent.svc.cluster.local:9090/api/v1/otlp
      - confluent.telemetry.exporter._c3.client.compression=gzip
      - confluent.telemetry.exporter._c3.api.key=dummy
      - confluent.telemetry.exporter._c3.api.secret=dummy
      - confluent.telemetry.exporter._c3.buffer.pending.batches.max=80
      - confluent.telemetry.exporter._c3.buffer.batch.items.max=4000
      - confluent.telemetry.exporter._c3.buffer.inflight.submissions.max=10
      - confluent.telemetry.metrics.collector.interval.ms=60000
      - confluent.telemetry.remoteconfig._confluent.enabled=false
      - confluent.consumer.lag.emitter.enabled=true
      # Fix embedded REST API backend: use SSL (not SASL_SSL) to match TOKEN listener on port 9073
      - kafka.rest.client.security.protocol=SSL
      - kafka.rest.client.ssl.keystore.location=/mnt/sslcerts/keystore.jks
      - kafka.rest.client.ssl.keystore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}
      - kafka.rest.client.ssl.key.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}
---
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 1
  enableSchemaExporter: true
  enableSchemaImporter: true
  passwordEncoder:
    secretRef: password-encoder-secret
  podTemplate:
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m
    probe:
      startup:
        failureThreshold: 30
        periodSeconds: 10
  image:
    application: confluentinc/cp-schema-registry:8.1.0
    init: confluentinc/confluent-init-container:3.1.0
  tls:
    secretRef: schemaregistry-tls
  authentication:
    type: mtls
    mtls:
      sslClientAuthentication: required
  authorization:
    type: rbac
    kafkaRestClassRef:
      name: secondary-cluster-restclass
  externalAccess:
    type: nodePort
    nodePort:
      host: secondary-control-plane
      nodePortOffset: 30081
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
      authentication:
        type: mtls
      tls:
        enabled: true
    mds:
      endpoint: https://kafka.confluent.svc.cluster.local:8090
      tokenKeyPair:
        secretRef: mds-token-keypair
      authentication:
        type: mtls
      tls:
        enabled: true
  configOverrides:
    server:
      - "sni.host.check.enabled=false"
      - "ssl.principal.mapping.rules=RULE:.*CN=([a-zA-Z0-9._-]*).*$$/$1/,DEFAULT"
      - "confluent.schema.registry.auth.ssl.principal.mapping.rules=RULE:.*CN=([a-zA-Z0-9._-]*).*$$/$1/,DEFAULT"
      - "kafkastore.ssl.keystore.location=/mnt/sslcerts/keystore.jks"
      - "kafkastore.ssl.keystore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "kafkastore.ssl.key.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.metadata.ssl.keystore.location=/mnt/sslcerts/keystore.jks"
      - "confluent.metadata.ssl.keystore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.metadata.ssl.key.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.schema.registry.auth.mechanism=SSL"
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestProxy
metadata:
  name: kafkarestproxy
  namespace: confluent
spec:
  image:
    application: confluentinc/cp-kafka-rest:8.1.0
    init: confluentinc/confluent-init-container:3.1.0
  replicas: 1
  tls:
    secretRef: krp-tls
  authentication:
    type: mtls
  authorization:
    type: rbac
    kafkaRestClassRef:
      name: secondary-cluster-restclass
  configOverrides:
    server:
      - sni.host.check.enabled=false
  podTemplate:
    resources:
      limits:
        memory: 512Mi
        cpu: 200m
      requests:
        memory: 256Mi
        cpu: 100m
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
      authentication:
        type: mtls
      tls:
        enabled: true
    schemaRegistry:
      authentication:
        type: mtls
      tls:
        enabled: true
      url: https://schemaregistry.confluent.svc.cluster.local:8081
    mds:
      endpoint: https://kafka.confluent.svc.cluster.local:8090
      tokenKeyPair:
        secretRef: mds-token-keypair
      authentication:
        type: mtls
      tls:
        enabled: true
---
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter-ng
  namespace: confluent
spec:
  replicas: 1
  podTemplate:
    resources:
      limits:
        memory: 2048Mi
        cpu: 500m
      requests:
        memory: 1024Mi
        cpu: 200m
  image:
    application: confluentinc/cp-enterprise-control-center-next-gen:2.3.0
    init: confluentinc/confluent-init-container:3.1.0
  dataVolumeCapacity: 10Gi
  tls:
    secretRef: controlcenter-ng-tls
  authorization:
    type: rbac
    kafkaRestClassRef:
      name: secondary-cluster-restclass
  dependencies:
    mds:
      endpoint: https://kafka.confluent.svc.cluster.local:8090
      tokenKeyPair:
        secretRef: mds-token-keypair
      authentication:
        type: mtls
      tls:
        enabled: true
    prometheusClient:
      url: https://controlcenter-ng.confluent.svc.cluster.local:9090
      authentication:
        type: mtls
      tls:
        enabled: true
        secretRef: prometheus-client-tls
    alertManagerClient:
      url: https://controlcenter-ng.confluent.svc.cluster.local:9093
      authentication:
        type: mtls
      tls:
        enabled: true
        secretRef: alertmanager-client-tls
    schemaRegistry:
      url: https://schemaregistry.confluent.svc.cluster.local:8081
      authentication:
        type: mtls
      tls:
        enabled: true
    connect:
      - name: connect
        url: https://connect.confluent.svc.cluster.local:8083
        authentication:
          type: mtls
        tls:
          enabled: true
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
      authentication:
        type: mtls
      tls:
        enabled: true
  services:
    prometheus:
       image: confluentinc/cp-enterprise-prometheus:2.2.1
       authentication:
         type: mtls
       tls:
         secretRef: prometheus-tls
       pvc:
         dataVolumeCapacity: 10Gi
    alertmanager:
       image: confluentinc/cp-enterprise-alertmanager:2.2.1
       authentication:
         type: mtls
       tls:
         secretRef: alertmanager-tls
  configOverrides:
    server:
      - sni.host.check.enabled=False
      - confluent.controlcenter.internal.topics.replication=1
      - "confluent.controlcenter.connect.connect.ssl.keystore.location=/mnt/sslcerts/keystore.jks"
      - "confluent.controlcenter.connect.connect.ssl.keystore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.controlcenter.connect.connect.ssl.key.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.controlcenter.streams.ssl.keystore.location=/mnt/sslcerts/keystore.jks"
      - "confluent.controlcenter.streams.ssl.keystore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.controlcenter.streams.ssl.key.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.metadata.ssl.keystore.location=/mnt/sslcerts/keystore.jks"
      - "confluent.metadata.ssl.keystore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
      - "confluent.metadata.ssl.key.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}"
