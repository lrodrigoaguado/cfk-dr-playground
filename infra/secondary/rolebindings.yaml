    connectClusterId: confluent.connect
---
# Following https://docs.confluent.io/operator/current/co-rbac.html#grant-role-to-ak-user-to-access-sr
apiVersion: platform.confluent.io/v1beta1
kind: ConfluentRolebinding
metadata:
  name: kafka-sr-resourceowner
  namespace: confluent
spec:
  principal:
    type: user
    name: kafka
  role: DeveloperRead
  clustersScopeByIds:
    kafkaClusterId: secondaryCluster-12345
    schemaRegistryClusterId: id_schemaregistry_confluent
  resourcePatterns:
    - name: "*"
      patternType: LITERAL
      resourceType: Subject
  kafkaRestClassRef:
    name: secondary-cluster-restclass
---
