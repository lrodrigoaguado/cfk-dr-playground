apiVersion: platform.confluent.io/v1beta1
kind: SchemaExporter
metadata:
  name: secondary-schema-exporter
  namespace: confluent
spec:
  contextType: NONE
  subjects:
    - "*"
  sourceCluster:
    schemaRegistryRest:
      endpoint: https://schemaregistry.confluent.svc.cluster.local:8081
      kafkaClusterID: "secondaryCluster-12345"
      authentication:
        type: mtls
      tls:
        secretRef: rest-class-tls
  destinationCluster:
    schemaRegistryRest:
      endpoint: https://primary-control-plane:30081
      kafkaClusterID: "primaryCluster-1234567"
      authentication:
        type: mtls
      tls:
        secretRef: rest-class-tls
