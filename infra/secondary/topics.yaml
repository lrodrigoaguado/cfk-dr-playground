---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: product-pageviews
  namespace: confluent
spec:
  kafkaRestClassRef:
    name: secondary-cluster-restclass
    namespace: confluent
  kafkaClusterRef:
    name: kafka
    namespace: confluent
  name: product-pageviews
  replicas: 1
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
    confluent.value.schema.validation: "true"
